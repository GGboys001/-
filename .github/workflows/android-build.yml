name: Build Signed Release APK
on:
  push:
    branches: [ main ]
  workflow_dispatch: # 支持手动点运行构建

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 拉取仓库代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 配置JDK17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 缓存依赖加速构建
      - name: Cache SDK & Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/Android/Sdk
          key: android-cache-${{ github.sha }}

      # 解码仓库密钥还原jks签名文件
      - name: Restore keystore
        env:
          KS_BASE64: ${{ secrets.KEYSTORE_FILE }}
        run: echo "$KS_BASE64" | base64 --decode > app/release-key.jks

      # 赋予打包脚本执行权限
      - name: Chmod gradlew
        run: chmod +x gradlew

      # 执行打包（注入签名信息）
      - name: Build Release APK
        env:
          STORE_PWD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PWD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -PstoreFile=release-key.jks \
            -PstorePassword=$STORE_PWD \
            -PkeyAlias=$KEY_ALIAS \
            -PkeyPassword=$KEY_PWD

      # 上传成品APK到构建产物
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Release-APK
          path: app/build/outputs/apk/release/app-release.apk
